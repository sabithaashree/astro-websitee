<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h1>Bookings</h1>

<a href="/logout">Logout</a>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Date</th>
<th>Session</th>
<th>Time</th>
<th>Delete</th>
</tr>

{% for b in bookings %}
<tr>
<td>{{ b[0] }}</td>
<td>{{ b[1] }}</td>
<td>{{ b[2] }}</td>
<td>{{ b[3] }}</td>
<td>{{ b[4] }}</td>
<td>{{ b[5] }}</td>
<td>{{ b[6] }}</td>
<td><a href="/delete/{{ b[0] }}">Delete</a></td>
</tr>
{% endfor %}

</table>

</body>
</html>
